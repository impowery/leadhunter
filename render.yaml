services:
  - type: worker
    name: leadhunter-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python lead_hunter_pro.py --loop
    envVarGroups:
  - name: leadhunter-config
    envVars:
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
